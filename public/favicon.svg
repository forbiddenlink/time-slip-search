<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- CRT screen background -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="#0a0908"/>
  <rect x="4" y="4" width="24" height="24" rx="2" fill="#1a1815"/>

  <!-- Clock face -->
  <circle cx="16" cy="14" r="8" fill="none" stroke="#40e0d0" stroke-width="1.5"
          style="filter: drop-shadow(0 0 3px #40e0d0);"/>

  <!-- Hour markers -->
  <line x1="16" y1="7" x2="16" y2="8.5" stroke="#40e0d0" stroke-width="1" stroke-linecap="round"/>
  <line x1="16" y1="19.5" x2="16" y2="21" stroke="#40e0d0" stroke-width="1" stroke-linecap="round"/>
  <line x1="9" y1="14" x2="10.5" y2="14" stroke="#40e0d0" stroke-width="1" stroke-linecap="round"/>
  <line x1="21.5" y1="14" x2="23" y2="14" stroke="#40e0d0" stroke-width="1" stroke-linecap="round"/>

  <!-- Hour hand (10 o'clock) -->
  <line x1="16" y1="14" x2="13" y2="9.5" stroke="#40e0d0" stroke-width="1.5" stroke-linecap="round"
        style="filter: drop-shadow(0 0 2px #40e0d0);"/>

  <!-- Minute hand (2 o'clock) -->
  <line x1="16" y1="14" x2="19.5" y2="9" stroke="#ffbf00" stroke-width="1.2" stroke-linecap="round"
        style="filter: drop-shadow(0 0 2px #ffbf00);"/>

  <!-- Center dot -->
  <circle cx="16" cy="14" r="1.2" fill="#ff3131"/>

  <!-- Rewind arrows -->
  <text x="16" y="27"
        font-family="monospace"
        font-size="6"
        fill="#ffbf00"
        text-anchor="middle"
        style="filter: drop-shadow(0 0 1px #ffbf00);">&#9668;&#9668;</text>
</svg>
