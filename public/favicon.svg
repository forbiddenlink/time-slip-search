<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- CRT screen background -->
  <rect x="2" y="2" width="28" height="28" rx="4" fill="#0a0908"/>
  <rect x="4" y="4" width="24" height="24" rx="2" fill="#1a1815"/>

  <!-- Phosphor glow "TS" -->
  <text x="16" y="21"
        font-family="monospace"
        font-size="12"
        font-weight="bold"
        fill="#40e0d0"
        text-anchor="middle"
        style="filter: drop-shadow(0 0 2px #40e0d0);">TS</text>

  <!-- Scanline effect -->
  <line x1="4" y1="10" x2="28" y2="10" stroke="#000" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="4" y1="14" x2="28" y2="14" stroke="#000" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="4" y1="18" x2="28" y2="18" stroke="#000" stroke-opacity="0.3" stroke-width="0.5"/>
  <line x1="4" y1="22" x2="28" y2="22" stroke="#000" stroke-opacity="0.3" stroke-width="0.5"/>

  <!-- REC indicator -->
  <circle cx="26" cy="6" r="2" fill="#ff3131"/>
</svg>
