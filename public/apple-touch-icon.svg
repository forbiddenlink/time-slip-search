<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background -->
  <rect width="180" height="180" rx="22" fill="#0a0908"/>

  <!-- CRT screen frame -->
  <rect x="15" y="15" width="150" height="150" rx="16" fill="#1a1815" stroke="#2d2a26" stroke-width="3"/>

  <!-- Clock face -->
  <circle cx="90" cy="80" r="40" fill="none" stroke="#40e0d0" stroke-width="3"
          style="filter: drop-shadow(0 0 8px #40e0d0) drop-shadow(0 0 16px rgba(64,224,208,0.3));"/>

  <!-- Hour markers - major (12, 3, 6, 9) -->
  <line x1="90" y1="43" x2="90" y2="49" stroke="#40e0d0" stroke-width="3" stroke-linecap="round"/>
  <line x1="90" y1="111" x2="90" y2="117" stroke="#40e0d0" stroke-width="3" stroke-linecap="round"/>
  <line x1="53" y1="80" x2="59" y2="80" stroke="#40e0d0" stroke-width="3" stroke-linecap="round"/>
  <line x1="121" y1="80" x2="127" y2="80" stroke="#40e0d0" stroke-width="3" stroke-linecap="round"/>

  <!-- Hour markers - minor -->
  <line x1="110" y1="46" x2="108" y2="49.5" stroke="rgba(64,224,208,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="124" y1="60" x2="121" y2="62" stroke="rgba(64,224,208,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="124" y1="100" x2="121" y2="98" stroke="rgba(64,224,208,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="110" y1="114" x2="108" y2="110.5" stroke="rgba(64,224,208,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="114" x2="72" y2="110.5" stroke="rgba(64,224,208,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="100" x2="59" y2="98" stroke="rgba(64,224,208,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="56" y1="60" x2="59" y2="62" stroke="rgba(64,224,208,0.5)" stroke-width="2" stroke-linecap="round"/>
  <line x1="70" y1="46" x2="72" y2="49.5" stroke="rgba(64,224,208,0.5)" stroke-width="2" stroke-linecap="round"/>

  <!-- Hour hand (10 o'clock position) -->
  <line x1="90" y1="80" x2="75" y2="56" stroke="#40e0d0" stroke-width="3" stroke-linecap="round"
        style="filter: drop-shadow(0 0 4px #40e0d0);"/>

  <!-- Minute hand (2 o'clock position) -->
  <line x1="90" y1="80" x2="109" y2="52" stroke="#ffbf00" stroke-width="2.5" stroke-linecap="round"
        style="filter: drop-shadow(0 0 4px #ffbf00);"/>

  <!-- Center dot -->
  <circle cx="90" cy="80" r="4" fill="#ff3131" style="filter: drop-shadow(0 0 3px #ff3131);"/>

  <!-- Rewind symbol and text -->
  <text x="78" y="145"
        font-family="monospace"
        font-size="20"
        fill="#ffbf00"
        style="filter: drop-shadow(0 0 4px rgba(255,191,0,0.5));"
        letter-spacing="-3">&#9668;&#9668;</text>
  <text x="100" y="145"
        font-family="monospace"
        font-size="10"
        fill="rgba(232,224,213,0.5)"
        letter-spacing="3">REWIND</text>

  <!-- REC indicator -->
  <circle cx="147" cy="33" r="5" fill="#ff3131" style="filter: drop-shadow(0 0 3px #ff3131);"/>

  <!-- Scanlines -->
  <g stroke="#000" stroke-opacity="0.15" stroke-width="1">
    <line x1="25" y1="50" x2="155" y2="50"/>
    <line x1="25" y1="65" x2="155" y2="65"/>
    <line x1="25" y1="95" x2="155" y2="95"/>
    <line x1="25" y1="110" x2="155" y2="110"/>
    <line x1="25" y1="130" x2="155" y2="130"/>
  </g>
</svg>
