<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <!-- Background -->
  <rect width="180" height="180" fill="#0a0908"/>

  <!-- CRT screen frame -->
  <rect x="15" y="15" width="150" height="150" rx="20" fill="#1a1815" stroke="#2d2a26" stroke-width="3"/>

  <!-- Inner screen -->
  <rect x="25" y="25" width="130" height="130" rx="10" fill="#0a0908"/>

  <!-- Main text "Time" -->
  <text x="90" y="75"
        font-family="Georgia, serif"
        font-size="32"
        fill="#e8e0d5"
        text-anchor="middle"
        font-weight="bold">Time</text>

  <!-- "Slip" with glow -->
  <text x="90" y="110"
        font-family="Georgia, serif"
        font-size="32"
        fill="#40e0d0"
        text-anchor="middle"
        font-weight="bold"
        style="filter: drop-shadow(0 0 4px #40e0d0);">Slip</text>

  <!-- "SEARCH" LED text -->
  <text x="90" y="135"
        font-family="monospace"
        font-size="14"
        fill="#ffbf00"
        text-anchor="middle"
        letter-spacing="4">SEARCH</text>

  <!-- Scanlines -->
  <g stroke="#000" stroke-opacity="0.2" stroke-width="1">
    <line x1="25" y1="40" x2="155" y2="40"/>
    <line x1="25" y1="55" x2="155" y2="55"/>
    <line x1="25" y1="70" x2="155" y2="70"/>
    <line x1="25" y1="85" x2="155" y2="85"/>
    <line x1="25" y1="100" x2="155" y2="100"/>
    <line x1="25" y1="115" x2="155" y2="115"/>
    <line x1="25" y1="130" x2="155" y2="130"/>
    <line x1="25" y1="145" x2="155" y2="145"/>
  </g>

  <!-- REC indicator -->
  <circle cx="150" cy="35" r="5" fill="#ff3131"/>
</svg>
